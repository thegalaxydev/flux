# cargo-about configuration for the bundled third-party license notices.
#
#   cargo install cargo-about          # one-time
#   cargo about generate about.hbs     # -> stdout (xtask captures it)
#
# `cargo xtask dist` runs this automatically when cargo-about is installed and
# writes the result to THIRD-PARTY-LICENSES.txt in the release bundle.

# Only the shipped Windows target's dependency licenses matter.
targets = ["x86_64-pc-windows-msvc"]

# Build scripts / proc-macros / dev-deps are not redistributed.
ignore-build-dependencies = true
ignore-dev-dependencies = true

# The workspace's own crates aren't third-party — skip them.
private = { ignore = true }

# SPDX licenses we accept for redistribution (permissive + weak-copyleft).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "BSL-1.0",
    "CC0-1.0",
    "OpenSSL",
]
