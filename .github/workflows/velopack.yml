name: velopack

# Builds the Velopack per-user installer + auto-update feed on a version tag and
# uploads them to the same GitHub Release as release.yml. Kept separate so the
# proven zip/Inno pipeline in release.yml is unaffected if Velopack changes.
#
# The in-app updater (flux_editor `updater.rs`) reads this feed from the release
# assets, so once a tagged release exists, installed users auto-update.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    env:
      HAS_SIGNING: ${{ secrets.AZURE_CLIENT_ID != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      # Stage the self-contained folder (exes + flux_script.dll + std-*.dll +
      # plugins/flux_game.dll + licenses).
      - name: Stage distribution folder
        run: cargo xtask dist --version ${{ github.ref_name }} --no-zip

      - name: Resolve stage path
        id: paths
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          "version=$ver" >> $env:GITHUB_OUTPUT
          "stage=dist/Flux-$ver-windows-x64" >> $env:GITHUB_OUTPUT

      # Sign the app binaries BEFORE packing, so the packaged app is trusted.
      - name: Sign app binaries
        if: env.HAS_SIGNING == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: ${{ steps.paths.outputs.stage }}
          files-folder-filter: exe,dll
          files-folder-recurse: true

      # Pull prior releases so vpk can build delta packages (no-op on the first
      # release — hence continue-on-error).
      - name: Fetch previous releases (delta updates)
        continue-on-error: true
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist/velopack | Out-Null
          vpk download github --repoUrl "https://github.com/${{ github.repository }}" --outputDir dist/velopack

      - name: Pack Velopack installer + feed
        run: cargo xtask velopack --version ${{ github.ref_name }}

      - name: Sign installer
        if: env.HAS_SIGNING == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.TRUSTED_SIGNING_PROFILE }}
          files-folder: dist/velopack
          files-folder-filter: exe

      # Upload the ENTIRE feed as release assets. The updater's GithubSource
      # reads the JSON manifests (`releases.win.json` / `assets.win.json`) and
      # the `*.nupkg` packages; users download `Flux-win-Setup.exe`. Uploading
      # everything vpk emits (incl. `RELEASES` + the portable zip) is the safe
      # default — a missing manifest silently breaks auto-update.
      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/velopack/*
          generate_release_notes: false
